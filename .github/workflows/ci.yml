on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff pytest pytest-cov pip-audit
          npm ci

      - name: Lint with ruff
        run: python -m ruff check app/ tests/ scripts/backup_data.py --select E,F,W --ignore E501

      - name: Check frontend JavaScript syntax
        run: npm run check:js

      - name: Test frontend helpers
        run: npm run test:js

      - name: Forbidden tunnel provider policy scan
        run: |
          FORBIDDEN_TUNNEL_PATTERN="$(printf '%s' 'cloud' 'flared|try' 'cloud' 'flare|' 'cloud' 'flare')"
          if git grep --untracked -n -i -E "$FORBIDDEN_TUNNEL_PATTERN" -- . ':!.cursor/**' ':!.workbuddy/**' ':!.git/**' ':!_Archive/**' ':!CHANGELOG.md' ':!WORK_PLAN.md' ':!docs/DEPLOY_TENCENT.md' ':!data/**' ':!uploads/**'; then
            echo "Forbidden tunnel provider pattern found"
            exit 1
          else
            echo "No forbidden tunnel provider pattern found"
          fi

      - name: Secret scan
        run: npm run scan:secrets

      - name: Dependency audit
        run: pip-audit -r requirements.txt

      - name: Run tests
        run: python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=20
