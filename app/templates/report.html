<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report - ScholarLint · 投稿通</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-4">Report: {{ job_id }}</h1>
        <p class="text-gray-500">Loading report...</p>
        <script>
            // Auto-fetch and render report
            fetch(`/api/report/{{ job_id }}`)
                .then(r => r.json())
                .then(data => { document.body.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>'; });
        </script>
    </div>
</body>
</html>
